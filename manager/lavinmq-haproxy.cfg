global
    log stdout format raw local0

defaults
    log global
    timeout connect 5s
    timeout client  60s
    timeout server  60s

resolvers docker
    nameserver dns 127.0.0.11:53
    resolve_retries 30
    timeout retry 1s
    hold valid 5s

# --------------------------------------------------------------------------
# Stable AMQP endpoint on host port 5672
# --------------------------------------------------------------------------
frontend lavinmq_amqp_front
    mode tcp
    bind *:5672
    default_backend lavinmq_amqp_back

backend lavinmq_amqp_back
    mode tcp
    balance leastconn
    option tcp-check
    server-template lavinmq 3 lavinmq:5672 check resolvers docker init-addr libc,none

# --------------------------------------------------------------------------
# Stable Dashboard endpoint on host port 15672
# --------------------------------------------------------------------------
frontend lavinmq_http_front
    mode http
    bind *:15672
    default_backend lavinmq_http_back

backend lavinmq_http_back
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server-template lavinmqui 3 lavinmq:15672 check resolvers docker init-addr libc,none

# ... (Keep your existing global, defaults, and LavinMQ sections) ...

# --------------------------------------------------------------------------
# SurrealDB Endpoint on host port 8000
# --------------------------------------------------------------------------
frontend surrealdb_front
    bind *:8000
    mode http
    default_backend surrealdb_back

backend surrealdb_back
    mode http
    #balance roundrobin
    #timeout tunnel 1h

    #option http-server-close
    #http-request set-header Host %[req.hdr(Host)]
    #http-request set-header X-Forwarded-For %[src]

    option httpchk GET /status
    http-check expect status 200
    #erver-template surreal 10 surrealdb:8000 check resolvers docker init-addr libc,none
    server surrealdb surrealdb:8000 check

